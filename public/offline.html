<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0b1220" />
    <title>MekaERP Offline</title>
    <style>
      html, body { height: 100%; }
      body { margin: 0; font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; background: #0b1220; color: #fff; display: grid; place-items: center; }
      .card { width: min(560px, 92vw); background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.12); border-radius: 16px; padding: 24px; }
      h1 { margin: 0 0 10px; font-size: 22px; }
      p { margin: 0 0 10px; opacity: 0.9; line-height: 1.5; }
      a { color: #93c5fd; text-decoration: none; font-weight: 600; }
      .row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }
      .btn { display: inline-block; padding: 10px 12px; border-radius: 12px; background: rgba(147,197,253,0.14); border: 1px solid rgba(147,197,253,0.3); }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Offline</h1>
      <p>MekaERP is not connected to the internet.</p>
      <p>If you have opened the POS before, you can still sell offline and sync later.</p>
      <div class="row">
        <a class="btn" href="/pos">Open POS</a>
        <a class="btn" href="/login">Login</a>
      </div>
    </div>
  </body>
</html>
